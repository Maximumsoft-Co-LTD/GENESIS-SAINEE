// ── Helpers ────────────────────────────────────────────────────────────────
var AT = 'risk';

function t(key){ return T[lang][key]; }

function toggleDark(){
  dark=!dark;
  document.getElementById('body').style.background=dark?'#0f172a':'#f1f5f9';
  document.getElementById('body').style.color=dark?'#cbd5e1':'#1e293b';
  document.getElementById('dtbtn').textContent=dark?'Light Mode':'Dark Mode';
  renderAll();
}

function toggleLang(){
  lang = lang==='en' ? 'th' : 'en';
  document.getElementById('lbtn').textContent = lang==='en' ? '🇹🇭 ภาษาไทย' : '🇬🇧 English';
  document.documentElement.lang = lang;
  renderAll();
}

function renderAll(){ renderTabs(); renderContent(); }

function bd(s){
  var c={HIGH:'#ef4444',MED:'#f59e0b',LOW:'#22c55e',CRITICAL:'#dc2626',CERTAIN:'#dc2626',UNKNOWN:'#6b7280'};
  var label = lang==='th'
    ? {HIGH:'สูง',MED:'ปานกลาง',LOW:'ต่ำ',CRITICAL:'วิกฤต',CERTAIN:'แน่นอน',UNKNOWN:'?'}[s]||s
    : s;
  return '<span style="background:'+(c[s]||'#6b7280')+';color:#fff;padding:1px 8px;border-radius:9999px;font-size:0.7rem;font-weight:700">'+label+'</span>';
}

function tbl(headers,rows){
  var bg=dark?'#0f172a':'#fff';
  var hbg=dark?'#1e293b':'#e2e8f0';
  var brd=dark?'#334155':'#cbd5e1';
  var alt=dark?'#1e293b':'#f8fafc';
  return '<div style="overflow-x:auto;border-radius:8px;border:1px solid '+brd+'"><table style="width:100%;border-collapse:collapse;font-size:0.81rem">'+
    '<thead><tr>'+headers.map(function(h){return '<th style="background:'+hbg+';color:'+(dark?'#94a3b8':'#475569')+';padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:2px solid '+brd+'">'+h+'</th>';}).join('')+'</tr></thead>'+
    '<tbody>'+rows.map(function(r,i){
      return '<tr style="background:'+(i%2===1?alt:bg)+'">'+(r.map?r.map(function(c){return '<td style="padding:7px 12px;border-bottom:1px solid '+brd+';vertical-align:top">'+c+'</td>';}).join(''):'<td>'+r+'</td>')+'</tr>';
    }).join('')+'</tbody></table></div>';
}

function code(s){ return '<code style="color:#a5b4fc;font-size:0.75rem">'+s+'</code>'; }
function h2(txt){ return '<h2 style="font-size:1.1rem;font-weight:700;color:'+(dark?'#fff':'#1e293b')+';margin-bottom:12px">'+txt+'</h2>'; }

// ── Tab bar ────────────────────────────────────────────────────────────────
var TAB_IDS = ['risk','boundaries','deps','flows','trust','dead','failures','debt'];

function renderTabs(){
  document.getElementById('tabBar').innerHTML = TAB_IDS.map(function(id, i){
    var a = id === AT;
    var label = t('tabs')[i];
    return '<button onclick="setTab(\''+id+'\')" style="padding:6px 14px;border-radius:6px 6px 0 0;font-size:0.8rem;font-weight:600;border:1px solid '+(a?'#6366f1':'#334155')+';border-bottom:none;background:'+(a?'#6366f1':'#1e293b')+';color:'+(a?'#fff':'#94a3b8')+';cursor:pointer">'+label+'</button>';
  }).join('');
}

function setTab(id){ AT=id; renderAll(); }

// ── Content renderer ───────────────────────────────────────────────────────
function renderContent(){
  var el = document.getElementById('tabContent');
  var brd = dark?'#334155':'#cbd5e1';

  if(AT==='risk'){
    el.innerHTML = h2(t('risk_title')+' — '+D.risk.length+(lang==='th'?' ปัญหา':' findings'))+
      tbl(t('risk_cols'), D.risk.map(function(r){
        return [code(r.p), r.cat, '<span style="font-size:0.8rem">'+(lang==='th'?r.f_th:r.f)+'</span>', bd(r.sev)];
      }));
    return;
  }
  if(AT==='boundaries'){
    el.innerHTML = h2(t('bound_title'))+
      tbl(t('bound_cols'), D.boundaries.map(function(r){
        return [
          code(r.p),
          '<code style="color:#4ade80">'+r.port+'</code>',
          r.proto,
          '<span style="font-size:0.78rem">'+(lang==='th'?r.ingress_th:r.ingress)+'</span>',
          '<span style="font-size:0.78rem">'+(lang==='th'?r.egress_th:r.egress)+'</span>',
          '<span style="font-size:0.78rem">'+(lang==='th'?r.auth_th:r.auth)+'</span>',
        ];
      }));
    return;
  }
  if(AT==='deps'){
    el.innerHTML = h2(t('deps_title')+' — '+D.deps.length+(lang==='th'?' packages':' packages'))+
      tbl(t('deps_cols'), D.deps.map(function(r){
        return [
          code(r.p),
          '<code style="color:#67e8f9;font-size:0.75rem">'+r.name+'</code>',
          '<span style="color:#94a3b8;font-size:0.75rem">'+r.ver+'</span>',
          lang==='th'?r.type_th:r.type,
          bd(r.risk),
        ];
      }));
    return;
  }
  if(AT==='flows'){
    el.innerHTML = h2(t('flows_title'))+
      D.flows.map(function(f){
        return '<div style="background:'+(dark?'#1e293b':'#f8fafc')+';border:1px solid '+brd+';border-radius:8px;padding:14px;margin-bottom:10px">'+
          '<div style="font-weight:700;color:'+(dark?'#fff':'#1e293b')+';margin-bottom:8px">'+(lang==='th'?f.name_th:f.name)+'</div>'+
          '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:6px;font-size:0.78rem">'+
          '<div><span style="color:#94a3b8">'+t('flow_src')+': </span><span style="color:#86efac">'+(lang==='th'?f.src_th:f.src)+'</span></div>'+
          '<div><span style="color:#94a3b8">'+t('flow_via')+': </span><span style="color:#fde68a">'+(lang==='th'?f.via_th:f.via)+'</span></div>'+
          '<div><span style="color:#94a3b8">'+t('flow_dst')+': </span><span style="color:#93c5fd">'+(lang==='th'?f.dst_th:f.dst)+'</span></div>'+
          '<div><span style="color:#94a3b8">'+t('flow_data')+': </span>'+f.data+'</div>'+
          '<div><span style="color:#94a3b8">'+t('flow_auth')+': </span>'+(lang==='th'?f.auth_th:f.auth)+'</div>'+
          '</div></div>';
      }).join('');
    return;
  }
  if(AT==='trust'){
    var lvlc = {UNTRUSTED:'#ef4444','SEMI-TRUSTED':'#f59e0b','TRUSTED (internal)':'#22c55e','TRUSTED (3rd party)':'#22c55e','TRUSTED (CDN)':'#22c55e','HIGH-VALUE TARGET':'#dc2626'};
    var lvlTh = {UNTRUSTED:'ไม่น่าเชื่อถือ','SEMI-TRUSTED':'น่าเชื่อถือบางส่วน','TRUSTED (internal)':'น่าเชื่อถือ (ภายใน)','TRUSTED (3rd party)':'น่าเชื่อถือ (ภายนอก)','TRUSTED (CDN)':'น่าเชื่อถือ (CDN)','HIGH-VALUE TARGET':'เป้าหมายมูลค่าสูง'};

        var lbl = lang==='th' ? (lvlTh[r.level]||r.level) : r.level;
        return [

          '<span style="background:'+(lvlc[r.level]||'#6b7280')+';color:#fff;padding:1px 8px;border-radius:9999px;font-size:0.7rem;font-weight:700">'+lbl+'</span>',
          '<span style="font-size:0.78rem">'+(lang==='th'?r.controls_th:r.controls)+'</span>',
          '<span style="color:#fca5a5;font-size:0.78rem">'+(lang==='th'?r.gaps_th:r.gaps)+'</span>',
        ];
      }));
    return;
  }
  if(AT==='dead'){
    el.innerHTML = h2(t('dead_title'))+
      tbl(t('dead_cols'), D.dead.map(function(r){
        return [
          code(r.p),
          '<code style="color:#94a3b8;font-size:0.75rem">'+r.loc+'</code>',
          '<code style="color:#fde68a;font-size:0.75rem">'+r.sym+'</code>',
          '<span style="font-size:0.78rem">'+(lang==='th'?r.f_th:r.f)+'</span>',
        ];
      }));
    return;
  }
  if(AT==='failures'){
    el.innerHTML = h2(t('fail_title')+' — '+D.failures.length+(lang==='th'?' สถานการณ์':' scenarios'))+
      tbl(t('fail_cols'), D.failures.map(function(r){
        return [
          code(r.p),
          '<span style="font-size:0.78rem;font-weight:600">'+(lang==='th'?r.s_th:r.s)+'</span>',
          bd(r.impact),
          bd(r.like),
          '<span style="color:#86efac;font-size:0.78rem">'+(lang==='th'?r.mit_th:r.mit)+'</span>',
          '<span style="color:#fca5a5;font-size:0.78rem">'+(lang==='th'?r.gap_th:r.gap)+'</span>',
        ];
      }));
    return;
  }
  if(AT==='debt'){
    var pc = {CRITICAL:'#dc2626',HIGH:'#f59e0b',MED:'#3b82f6',LOW:'#6b7280'};
    var priTh = {CRITICAL:'วิกฤต',HIGH:'สูง',MED:'ปานกลาง',LOW:'ต่ำ'};

      tbl(t('debt_cols'), D.debt.map(function(r){
        var priLabel = lang==='th' ? (priTh[r.pri]||r.pri) : r.pri;
        return [
          code(r.p),
          '<span style="color:#fde68a;font-size:0.8rem;font-weight:600">'+(lang==='th'?r.item_th:r.item)+'</span>',
